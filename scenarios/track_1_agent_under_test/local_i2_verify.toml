# Auftrag I2 — Mini-Verifikation Wert-Durchfluss-Check (I1-Fix).
# 6 Tasks × 3 Trials = 18 Runs, geschätzt $3-4.
#
# Dis-Targets:  dis_20, dis_26, dis_32, dis_34, dis_36
# Dis-Regression: dis_0
#
# Run: set -a && source .env && set +a && \
#      AGENT_CLASS=glassbox AGENT_LLM=anthropic/claude-sonnet-4-6 \
#      GLASSBOX_LOG_FILE=_local/runs/i2_verify_agent.log \
#      nohup uv run car-bench-run scenarios/track_1_agent_under_test/local_i2_verify.toml \
#      > _local/runs/i2_verify.log 2>&1 &

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 3
task_split = "train"
tasks_disambiguation_task_id_filter = ["disambiguation_0", "disambiguation_20", "disambiguation_26", "disambiguation_32", "disambiguation_34", "disambiguation_36"]
seed = 10
max_steps = 50
