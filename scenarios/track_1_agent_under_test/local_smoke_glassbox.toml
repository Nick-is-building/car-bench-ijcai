# Local smoke scenario for the glassbox deterministic-shell agent.
# Uses AGENT_CLASS=glassbox env var to activate the deterministic shell.
# Run: AGENT_CLASS=glassbox AGENT_LLM=anthropic/claude-sonnet-4-6 \
#      uv run car-bench-run scenarios/track_1_agent_under_test/local_smoke_glassbox.toml --show-logs

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "AGENT_CLASS=glassbox python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
max_steps = 50
