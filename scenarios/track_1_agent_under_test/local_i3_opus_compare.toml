# Auftrag I3 — Modellvergleich Opus-4-6 vs. Sonnet-4-6.
# Identisches Task-Set wie H-Verifikation: 18 Tasks × 3 Trials = 54 Runs.
# Geschätzt $50-55 (Opus 5× teurer als Sonnet).
#
# Vergleichsbasis: H-Verifikation (Lauf 20260711-103751) mit Sonnet-4-6.
#
# Run: set -a && source .env && set +a && \
#      AGENT_CLASS=glassbox AGENT_LLM=anthropic/claude-opus-4-6 \
#      GLASSBOX_LOG_FILE=_local/runs/i3_opus_agent.log \
#      nohup uv run car-bench-run scenarios/track_1_agent_under_test/local_i3_opus_compare.toml \
#      > _local/runs/i3_opus.log 2>&1 &

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 3
task_split = "train"
tasks_base_task_id_filter = ["base_10", "base_28", "base_30", "base_32"]
tasks_disambiguation_task_id_filter = ["disambiguation_0", "disambiguation_16", "disambiguation_18", "disambiguation_20", "disambiguation_22", "disambiguation_24", "disambiguation_28", "disambiguation_32", "disambiguation_34", "disambiguation_36"]
tasks_hallucination_task_id_filter = ["hallucination_10", "hallucination_16", "hallucination_28", "hallucination_32"]
seed = 10
max_steps = 50
